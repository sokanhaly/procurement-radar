name: Procurement Radar Scan
# When this runs:
#   - Weekly on Monday at 12:00 UTC (8am ET summer / 7am ET winter)
#   - Manually, anytime, via the "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the job can commit results.json + snapshot.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Run procurement scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NYSTART_USERNAME: ${{ secrets.NYSTART_USERNAME }}
          NYSTART_PASSWORD: ${{ secrets.NYSTART_PASSWORD }}
        run: python main.py
      - name: Commit updated results and snapshot
        run: |
          git config user.name "procurement-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard/results.json snapshot.json || true
          git commit -m "Update scan results $(date -u +%Y-%m-%dT%H:%MZ)" || echo "No changes to commit"
          git push || echo "Nothing to push"
